<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — The JoyBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="cart.js"></script>
</head>
<body>
<header class="top">
  <div class="brand"><a href="/" style="color:inherit;text-decoration:none;"><span class="accent">The</span> JoyBox</a></div>
  <nav class="top" id="nav"></nav>
</header>

<main>
  <p class="eyebrow">Checkout</p>
  <h1 class="headline">Your order</h1>

  <div id="msg-area"></div>
  <div id="cart-items"></div>

  <div class="admin-form" id="checkout-form-wrap" style="display:none;">
    <h3 class="display" style="margin-top:0;">Delivery details</h3>
    <form id="checkout-form">
      <div>
        <label for="address">Delivery address</label>
        <input id="address" required placeholder="Flat / building, street, area">
      </div>
      <div>
        <label for="phone">Phone number</label>
        <input id="phone" required placeholder="For the delivery person to reach you">
      </div>
      <div>
        <label>Payment method</label>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:6px;">
          <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:15px;color:var(--parchment);">
            <input type="radio" name="payment" value="cod" checked style="width:auto;">
            Cash on Delivery
          </label>
          <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:15px;color:var(--parchment-dim);opacity:0.5;">
            <input type="radio" name="payment" value="online" disabled style="width:auto;">
            Online payment (coming soon)
          </label>
        </div>
      </div>
      <button type="submit" class="primary" id="place-order-btn">Place order — Cash on Delivery</button>
    </form>
  </div>
</main>

<script>
let me = null;
let menuById = {};

async function loadMe() {
  const res = await fetch('/api/me');
  const data = await res.json();
  me = data.user;
  if (!me) { location.href = '/login.html'; return false; }
  renderNav();
  return true;
}

function renderNav() {
  document.getElementById('nav').innerHTML = `
    <a href="/">Menu</a>
    <a href="/my-orders.html">My Orders</a>
    ${me.isAdmin ? '<a href="/admin.html">Admin</a>' : ''}
    <a href="#" id="logout-link">Log out</a>
  `;
  document.getElementById('logout-link').addEventListener('click', async (e) => {
    e.preventDefault();
    await fetch('/api/logout', { method: 'POST' });
    location.href = '/';
  });
}

async function loadMenuLookup() {
  const res = await fetch('/api/menu/today');
  const data = await res.json();
  menuById = {};
  (data.menu || []).forEach(item => { menuById[item.daily_menu_id] = item; });
}

function renderCart() {
  const cart = getCart();
  const container = document.getElementById('cart-items');
  const formWrap = document.getElementById('checkout-form-wrap');
  const ids = Object.keys(cart);

  if (ids.length === 0) {
    container.innerHTML = `<p class="hint">Your cart is empty. <a href="/" style="color:var(--brass);">Browse today's menu →</a></p>`;
    formWrap.style.display = 'none';
    return;
  }

  let total = 0;
  let rows = '';
  let hadStaleItem = false;

  ids.forEach(id => {
    const item = menuById[id];
    if (!item) { hadStaleItem = true; return; } // no longer on today's menu
    const qty = cart[id];
    const lineTotal = item.price * qty;
    total += lineTotal;
    rows += `
      <li>
        <span>${escapeHtml(item.name)} × ${qty}</span>
        <span>₹${lineTotal.toFixed(2)}
          <a href="#" data-remove="${id}" style="color:var(--rust);margin-left:12px;font-size:13px;">Remove</a>
        </span>
      </li>
    `;
  });

  if (hadStaleItem) {
    saveStaleCleanup(cart);
  }

  container.innerHTML = `
    <ul class="order-list">${rows}</ul>
    <p style="margin-top:16px;font-size:18px;" class="display">Total: ₹${total.toFixed(2)}</p>
  `;

  container.querySelectorAll('[data-remove]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      removeFromCart(link.dataset.remove);
      renderCart();
    });
  });

  formWrap.style.display = rows ? 'block' : 'none';
  updateCartBadge();
}

function saveStaleCleanup(cart) {
  const cleaned = {};
  Object.keys(cart).forEach(id => { if (menuById[id]) cleaned[id] = cart[id]; });
  saveCart(cleaned);
}

document.getElementById('checkout-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const address = document.getElementById('address').value;
  const phone = document.getElementById('phone').value;
  const btn = document.getElementById('place-order-btn');
  btn.disabled = true;
  btn.textContent = 'Placing order…';

  const cart = getCart();
  const ids = Object.keys(cart);
  const errors = [];

  for (const id of ids) {
    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        daily_menu_id: Number(id),
        quantity: cart[id],
        delivery_address: address,
        phone,
        payment_method: 'cod'
      })
    });
    if (!res.ok) {
      const data = await res.json();
      const name = menuById[id] ? menuById[id].name : `item ${id}`;
      errors.push(`${name}: ${data.error}`);
      removeFromCart(id); // drop the failed item so it doesn't block the rest
    } else {
      removeFromCart(id);
    }
  }

  const msgArea = document.getElementById('msg-area');
  if (errors.length === 0) {
    msgArea.innerHTML = `<div class="msg ok">Order placed — cash on delivery. See you soon!</div>`;
    document.getElementById('checkout-form').reset();
    setTimeout(() => { location.href = '/my-orders.html'; }, 1200);
  } else {
    msgArea.innerHTML = `<div class="msg error">Some items couldn't be ordered: ${errors.join('; ')}. Remaining items were placed successfully.</div>`;
  }
  renderCart();
  btn.disabled = false;
  btn.textContent = 'Place order — Cash on Delivery';
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

(async () => {
  const ok = await loadMe();
  if (!ok) return;
  await loadMenuLookup();
  renderCart();
})();
</script>
</body>
</html>
